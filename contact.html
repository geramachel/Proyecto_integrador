<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entremaderas</title>
    <link rel="stylesheet" href="./css/app.css">
</head>

<body>

    <!-- Encabezado -->
    <section class="hero">
        <header class="hero__header">
            <h4 class="logo">Entremaderas</h4>
            <div class="header__right">
                <p>Trova-Rumba-Son-Folk</p>
                <nav>
                    <ul class="menu">
                        <li class="menu__item"><a href="./us.html">Nosotros</a></li>
                        <li class="menu__item"><a href="./gallery.html">Galería</a></li>
                        <li class="menu__item"><a href="./merchandising.html">Merchandising</a></li>
                        <li class="menu__item"><a href="./contact.html">Contacto</a></li>
                        <div class="carrito">
                            <img src="./images/icon/carrito-de-compras.png" alt="carrito">
                        </div>
                    </ul>
                </nav>
            </div>
        </header>
        <div class="hero__main">
            <div class="hero__text">
                <h4>Escucha nuestro nuevo EP</h4>
                <h2>Tocando</h2>
                <h3>Madera</h3>
            </div>
            <div class="hero__img">
                <img src="./images/Images EM/Portadas/Tocando madera.jpg" alt="Tocando_madera">
            </div>
        </div>
    </section>

    <section class="contact">
        <div class="titles">
            <h5>Contacto</h5>
        </div>
        <form class="contact__form">
            <input class="name" type="text" placeholder="Nombre" name="name">
            <input class="lastname" type="text" placeholder="Apellido" name="lastname">
            <input class="email" type="email" placeholder="Email" name="email">
            <input class="phone" type="text" placeholder="Teléfono" name="phone" onfocus="(this.type='number')"
                onblur="(this.type='number')">
            <input class="doc" type="text" placeholder="Documento" name="doc" onfocus="(this.type='number')"
                onblur="(this.type='number')">

            <input class="button" type="button" value="Listo" name="listo">
        </form>
    </section>

    <footer>
        <div class="footer">
            <div class="footer__top">
                <div>
                    <h2>Entremaderas</h2>
                    <p>Trova-Rumba-Son-Folk</p>
                </div>
                <div class="address">
                    <p>Lima - Perú <br>
                        entremaderasmusica@gmail.com
                    </p>
                </div>
            </div>
            <div class="footer__bottom">
                <p>© ALL RIGHTS RESERVED.</p>
                <div class="cointain__icons">
                    <div class="icons__socialnetwork">
                        <a href="https://www.instagram.com/entremaderasmusica/" target="_blank"><img src="./images/icon/logo-instagram.svg" alt="instagram"></a>
                        <a href="https://www.facebook.com/entremaderasmusica" target="_blank"><img src="./images/icon/logo-facebook.svg" alt="facebook"></a>
                        <a href="https://www.youtube.com/channel/UCss399JuFOrzWqGdq98pePA" target="_blank"><img src="./images/icon/logo-youtube.svg" alt="youtube"></a>
                        <a href="https://open.spotify.com/artist/5ZPqIamWjoEPdRTBMZzWJ3" target="_blank"><img src="./images/icon/musical-notes-outline.svg" alt="spotify"></a>
                    </div>
                </div>
            </div>
        </div>
    </footer>
